<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Entel - Ofertas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <header>
    <div class="header-content">
        <div class="logo-wrapper">
            <img src="./img/Entel_(Chile,_2020-present).svg" alt="Entel Logo" class="logo-entel">
        </div>

        <div class="banner-promocional">
            <img src="./img/banner fibra.png" alt="Oferta Fibra Hogar" class="img-banner">
        </div>
        
        <h1>Ofertas Móviles Entel</h1>
        <div class="badge-plan">Plan Móvil Fijo: $17.990</div>
        
        <input type="text" id="busqueda" placeholder="¿Qué equipo buscas? (Ej: Samsung, Xiaomi...)">
    </div>
</header>

    <main>
        <div id="catalogo" class="grid-catalogo"></div>
    </main>

    <a href="https://wa.me/56965699563" class="btn-whatsapp" target="_blank">
        <span>Hablar con un ejecutivo</span>
    </a>

    <div id="modalImagen" class="modal" onclick="this.style.display='none'">
        <span class="cerrar-modal">&times;</span>
        <img class="modal-contenido" id="imgGrande">
        <div id="caption"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
