<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspiración Entel 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">entel</div>
            <nav>
                <a href="#">Personas</a>
                <a href="#">Empresas</a>
                <a href="#" class="btn-mi-entel">Mi Entel</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <span class="badge">NUEVO LANZAMIENTO</span>
                <h1>Samsung Galaxy S26 Ultra</h1>
                <p>Pórtate con 50% dcto. y llévalo en 24 cuotas sin interés.</p>
                <button class="btn-primary">Lo quiero</button>
            </div>
        </section>

        <section class="grid-productos">
            <div class="card">
                <div class="discount-label">36% DCTO.</div>
                <img src="https://via.placeholder.com/150" alt="Smartphone">
                <h3>Samsung Galaxy A56 5G</h3>
                <p class="precio-normal">Antes: $499.990</p>
                <p class="precio-oferta">$319.990</p>
                <button class="btn-outline">Ver más</button>
            </div>
            
            <div class="card">
                <div class="discount-label">25% DCTO.</div>
                <img src="https://via.placeholder.com/150" alt="Smartphone">
                <h3>Honor Magic 8 Lite</h3>
                <p class="precio-normal">Antes: $519.990</p>
                <p class="precio-oferta">$389.990</p>
                <button class="btn-outline">Ver más</button>
            </div>
        </section>
    </main>
</body>
</html>
